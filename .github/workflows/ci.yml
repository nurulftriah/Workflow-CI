name: CI - Training + Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  # ─── Job 1: Training model & logging ke DagsHub MLflow ───────────────────
  training:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install mlflow scikit-learn pandas numpy dagshub

      - name: Run training & log to DagsHub MLflow
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python MLProject/modelling.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: mlruns/

  # ─── Job 2: Build & push Docker image ke Docker Hub ──────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: training

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./MLProject
          file: ./MLProject/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eksperimen-sml-nurul:latest

      - name: Print Docker Hub link
        run: |
          echo "✅ Training selesai & image berhasil di-push!"
          echo "🔗 https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/eksperimen-sml-nurul"
